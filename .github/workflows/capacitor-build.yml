name: Build Android APK with Capacitor

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install extra Vite plugins for SPA build
        run: bun add -d @vitejs/plugin-react @tanstack/router-plugin

      - name: Build SPA for Capacitor
        run: bunx vite build --config vite.spa.config.ts

      - name: Verify dist-spa/index.html
        run: |
          ls dist-spa/
          test -f dist-spa/index.html && echo "index.html OK" || (echo "index.html MISSING" && exit 1)

      - name: Install Capacitor packages
        run: |
          bun add @capacitor/core @capacitor/android
          bun add -d @capacitor/cli

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
